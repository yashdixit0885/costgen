name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create venv (${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install package + extras
        run: uv pip install -e ".[all,dev]"
      - name: Lint
        run: uv run ruff check src tests examples
      - name: Test + coverage
        run: uv run pytest --cov=costgen --cov-report=term-missing
      - name: Enforce 100% coverage on cost-math core (Constitution IV)
        run: uv run pytest --cov=costgen._engine.calculator --cov-fail-under=100 tests/unit/test_calculator.py

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: pip install (isolated venv)
        run: |
          uv venv --seed --python 3.11 .pipenv
          .pipenv/bin/pip install .
          .pipenv/bin/python -c "import costgen; print('pip ->', costgen.__version__)"
      - name: uv install (isolated venv)
        run: |
          uv venv --python 3.11 .uvenv
          uv pip install --python .uvenv/bin/python .
          .uvenv/bin/python -c "import costgen; print('uv  ->', costgen.__version__)"
