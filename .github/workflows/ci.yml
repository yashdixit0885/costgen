name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install (pip path)
        run: uv pip install --system -e ".[all,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test + full coverage
        run: pytest --cov=costgen --cov-report=term-missing
      - name: Enforce 100% coverage on cost-math core (Constitution IV)
        run: pytest --cov=costgen._engine.calculator --cov-fail-under=100 tests/unit/test_calculator.py

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: pip install
        run: |
          python -m pip install .
          python -c "import costgen; print(costgen.__version__)"
      - name: uv install
        run: |
          uv pip install --system --reinstall .
          python -c "import costgen; print(costgen.__version__)"
